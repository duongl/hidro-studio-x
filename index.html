<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Handle Google OAuth Implicit Flow redirections in popups
      try {
        if (window.opener && window.location.hash.includes('access_token=')) {
          const params = new URLSearchParams(window.location.hash.substring(1));
          const accessToken = params.get('access_token');
          if (accessToken) {
            window.opener.postMessage({ type: 'GDRIVE_OAUTH_SUCCESS', token: accessToken }, '*');
            window.close();
          }
        }
      } catch (e) {
        console.warn('OAuth callback intercept failed:', e);
      }
    </script>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" errors
      try {
        const originalFetch = window.fetch;
        let activeFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get() {
            return activeFetch;
          },
          set(value) {
            activeFetch = value;
          }
        });
      } catch (e) {
        console.warn('Could not inject window.fetch override shield:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
